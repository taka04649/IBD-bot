# .github/workflows/pubmed_bot.yml
name: PubMed UC Bot

on:
  schedule:
    - cron: "0 23 * * *"  # UTC 23:00 = JST 08:00
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore notified PMIDs
        uses: actions/cache@v4
        with:
          path: notified_pmids.json
          key: notified-pmids-${{ github.run_id }}
          restore-keys: notified-pmids-

      - name: Run bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python pubmed_discord_bot.py
